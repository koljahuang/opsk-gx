apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: opsk
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 3080
    targetPort: 3080
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: backend
