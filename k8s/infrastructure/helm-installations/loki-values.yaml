# Grafana Loki — Single Binary mode (log storage)
# Internal service only — no Ingress/ALB
# Endpoint: http://loki.monitoring.svc:3100

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  persistence:
    enabled: true
    storageClass: gp3
    size: 10Gi
  nodeSelector:
    karpenter.sh/nodepool: common-nodepool

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  limits_config:
    retention_period: 168h  # 7 days

# Disable distributed components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable sub-charts
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
minio:
  enabled: false

# Canary is a health-check DaemonSet — not needed, causes scheduling issues on non-Karpenter nodes
lokiCanary:
  enabled: false
test:
  enabled: false
