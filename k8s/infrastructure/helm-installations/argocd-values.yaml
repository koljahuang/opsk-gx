# ArgoCD - GitOps continuous delivery for Kubernetes
# Minimal config: single-replica, no HA, no Dex (use built-in auth)

global:
  nodeSelector:
    karpenter.sh/nodepool: common-nodepool

configs:
  params:
    # Run in insecure mode (TLS terminated at ALB/Ingress)
    server.insecure: true

server:
  replicas: 1
  service:
    type: ClusterIP

controller:
  replicas: 1

repoServer:
  replicas: 1

redis:
  enabled: true

dex:
  enabled: false

notifications:
  enabled: true
  argocdUrl: https://argocd.opsk.internal

  notifiers:
    service.webhook.opsk: |
      url: http://opsk-backend.opsk.svc.cluster.local:3080/api/webhooks/argocd
      headers:
        - name: Content-Type
          value: application/json

  templates:
    template.opsk-sync: |
      webhook:
        opsk:
          method: POST
          body: |
            {
              "app_name": "{{.app.metadata.name}}",
              "project": "{{.app.spec.project}}",
              "sync_status": "{{.app.status.sync.status}}",
              "health_status": "{{.app.status.health.status}}",
              "revision": "{{.app.status.sync.revision}}",
              "dest_server": "{{.app.spec.destination.server}}",
              "dest_namespace": "{{.app.spec.destination.namespace}}",
              "message": "{{.app.metadata.name}} is {{.app.status.sync.status}} / {{.app.status.health.status}}"
            }

  triggers:
    trigger.on-sync-succeeded: |
      - when: app.status.operationState.phase in ['Succeeded']
        send: [opsk-sync]
    trigger.on-sync-failed: |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [opsk-sync]
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [opsk-sync]

  # Subscribe all apps by default
  subscriptions:
    - recipients:
        - opsk
      triggers:
        - on-sync-succeeded
        - on-sync-failed
        - on-health-degraded

applicationSet:
  replicas: 1
