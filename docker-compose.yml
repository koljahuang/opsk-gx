version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: opsk-postgres
    environment:
      POSTGRES_DB: opsk
      POSTGRES_USER: opsk
      POSTGRES_PASSWORD: opsk_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
