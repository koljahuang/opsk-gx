# ExternalSecret for observability components (Alloy) in the monitoring namespace.
# Syncs Grafana Cloud credentials from AWS Secrets Manager → K8s Secret.
# Alloy mounts these as env vars for remote_write basic_auth.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: observability-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: observability-secrets
    creationPolicy: Owner
  data:
  - secretKey: GRAFANA_CLOUD_METRICS_USERNAME
    remoteRef:
      key: opsk-612674025488-us-west-1-kolya-backend-secrets
      property: grafana-cloud-metrics-username
  - secretKey: GRAFANA_CLOUD_LOGS_USERNAME
    remoteRef:
      key: opsk-612674025488-us-west-1-kolya-backend-secrets
      property: grafana-cloud-logs-username
  - secretKey: GRAFANA_CLOUD_TRACES_USERNAME
    remoteRef:
      key: opsk-612674025488-us-west-1-kolya-backend-secrets
      property: grafana-cloud-traces-username
  - secretKey: GRAFANA_CLOUD_API_TOKEN
    remoteRef:
      key: opsk-612674025488-us-west-1-kolya-backend-secrets
      property: grafana-cloud-api-token
