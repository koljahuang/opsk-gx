# Allow opsk-backend to manage ArgoCD repository Secrets
# so Code Repos can auto-sync credentials to ArgoCD.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opsk-argocd-repo-manager
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opsk-argocd-repo-manager
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: backend
    namespace: opsk
roleRef:
  kind: Role
  name: opsk-argocd-repo-manager
  apiGroup: rbac.authorization.k8s.io
